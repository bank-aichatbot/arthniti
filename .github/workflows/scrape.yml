name: ArthNiti - Scrape RBI Documents

on:
  schedule:
    # Runs on the 1st of every month at 02:00 UTC
    - cron: '0 2 1 * *'
  workflow_dispatch:
    # Manual trigger from GitHub Actions tab
    inputs:
      force_refresh:
        description: 'Force re-scrape even if no changes detected'
        required: false
        default: 'false'
        type: boolean

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run scraper
        env:
          FORCE_REFRESH: ${{ github.event.inputs.force_refresh || 'false' }}
        run: node scrape.js

      - name: Commit and push changes
        run: |
          git config --global user.name 'ArthNiti Bot'
          git config --global user.email 'arthniti-bot@noreply.github.com'
          git add data/ snapshots/
          if git diff --staged --quiet; then
            echo "No changes to commit - all documents unchanged"
          else
            CHANGED=$(git diff --staged --name-only | wc -l)
            git commit -m "chore: scrape update - ${CHANGED} file(s) changed [$(date -u '+%Y-%m-%d %H:%M UTC')]"
            git push
          fi
